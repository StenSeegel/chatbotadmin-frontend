# Rate-Limiting-Zone für die API (Flut-Schutz, pro Client-IP).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    server_name localhost;

    # API-Proxy: leitet /api/chat an das KI-Backend weiter.
    # (Im Dev-Modus übernimmt das der Vite-Proxy aus vite.config.ts.)
    location /api/ {
        # Kurzzeitige Spitzen abfedern, Dauerlast/Flut begrenzen.
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://local-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Streaming (Server-Sent Events) für /api/chat
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Gehashte Assets sind unveränderlich → dauerhaft cachen.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html nie cachen, damit der Browser immer das aktuelle Bundle lädt.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # widget.js trägt keinen Hash und wird zentral eingebunden → nie cachen,
    # damit Änderungen ohne Verzögerung bei allen Einbettungen ankommen.
    location = /widget.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
