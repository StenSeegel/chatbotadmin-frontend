# Rate-Limiting-Zone für die API (Flut-Schutz, pro Client-IP).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    server_name sv90073.hrz.uni-giessen.de;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sv90073.hrz.uni-giessen.de;

    # SSL Certificates (mounted via docker-compose)
    ssl_certificate /etc/nginx/ssl/sv90073.pem;
    ssl_certificate_key /etc/nginx/ssl/priv.pem;

    # Modern SSL configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # API-Proxy: leitet /api/chat an das KI-Backend weiter,
    # sodass der API-Key serverseitig bleibt (gleiche Logik wie der Vite-Proxy).
    location /api/ {
        # Kurzzeitige Spitzen abfedern, Dauerlast/Flut begrenzen.
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Streaming (Server-Sent Events) für /api/chat
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # widget.js trägt keinen Hash und wird zentral eingebunden → nie cachen,
    # damit Änderungen ohne Verzögerung bei allen Einbettungen ankommen.
    location = /widget.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
