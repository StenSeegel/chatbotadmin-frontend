services:
  # Local Build & Run (Builds the image from local source code)
  local-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbotadmin-frontend-local
    ports:
      - "8081:80"             # Alternate port for local builds to avoid conflicts
    depends_on:
      - local-backend         # Nginx proxyt /api/ an diesen Service weiter

  # Local KI-Backend: stellt /api/chat bereit (wie der Vite-Dev-Proxy).
  # Liest KI_API_KEY / KI_BASE_URL aus .env; der Key bleibt serverseitig.
  local-backend:
    build:
      context: ./server
    container_name: chatbotadmin-backend-local
    env_file:
      - .env
    environment:
      - WIDGETS_FILE=/app/data/widgets.json   # Persistente Widget-Konfigs (Volume)
      - HISTORY_FILE=/app/data/history.json   # Persistente Gesprächsverläufe (Volume)
    volumes:
      - backend-data-local:/app/data
    expose:
      - "3001"                # Nur im Compose-Netzwerk erreichbar, nicht auf dem Host
    restart: unless-stopped

  # Override widget-test-site for local dev: run nginx as root to avoid bind-mount permission issues on macOS
  widget-test-site:
    volumes:
      - ./widget-test:/usr/share/nginx/html:ro
      - ./widget-test-nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  backend-data-local:           # Persistente Widget-Konfigurationen (lokaler Build)

