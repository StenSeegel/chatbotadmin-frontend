name: CI & Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Ältere Läufe desselben Branch/PR abbrechen, sobald ein neuer startet.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ── Gate 1: Frontend (Lint, Typecheck/Build, Tests) ──────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build

      - name: Test
        run: npm test

  # ── Gate 2: Go-Backend (vet, build, tests) ───────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go-backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  # ── Gate 3: API-Vertrag (Spec-Lint, Codegen aktuell, Breaking Changes) ───
  # Die OpenAPI-Spec (go-backend/internal/apidocs/openapi.yaml) ist die Quelle
  # der Wahrheit: internal/api/gen.go und src/types/api.gen.ts werden aus ihr
  # generiert. Dieses Gate stellt sicher, dass die Spec valide ist, die
  # generierten Dateien zur Spec passen und ein PR die API nicht unbemerkt
  # inkompatibel ändert.
  api-contract:
    runs-on: ubuntu-latest
    env:
      SPEC: go-backend/internal/apidocs/openapi.yaml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go-backend/go.sum

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2 lint "$SPEC"

      - name: Check Go codegen is up to date
        working-directory: ./go-backend
        run: |
          go generate ./internal/api
          git diff --exit-code -- internal/api/gen.go \
            || { echo "::error::internal/api/gen.go ist nicht aktuell — 'go generate ./internal/api' ausführen und committen."; exit 1; }

      - name: Check TypeScript codegen is up to date
        run: |
          npm ci
          npm run generate:api-types
          git diff --exit-code -- src/types/api.gen.ts \
            || { echo "::error::src/types/api.gen.ts ist nicht aktuell — 'npm run generate:api-types' ausführen und committen."; exit 1; }

      # Breaking-Change-Erkennung nur in PRs: Spec des Basis-Branches gegen
      # die des PRs. Schlägt nur bei echten Inkompatibilitäten (ERR) an.
      - name: Fetch base spec (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          git show "origin/$GITHUB_BASE_REF:$SPEC" > /tmp/base-openapi.yaml 2>/dev/null \
            || echo "" > /tmp/base-openapi.yaml

      - name: Detect breaking API changes (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s /tmp/base-openapi.yaml ]; then
            echo "Basis-Branch hat noch keine Spec — Breaking-Check übersprungen."
            exit 0
          fi
          go install github.com/oasdiff/oasdiff@latest
          oasdiff breaking --fail-on ERR /tmp/base-openapi.yaml "$SPEC"

  # ── Publish: nur nach bestandenen Gates und nur auf push→main ────────────
  build-and-push:
    needs: [ frontend, backend, api-contract ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # One job per image. The frontend builds from the repo root; the backend
    # builds from go-backend/ so staging/prod can pull it instead of compiling
    # Go on the server (which fails behind the HRZ proxy).
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: chatbotadmin-frontend
            context: .
            file: Dockerfile
          - name: chatbotadmin-backend
            context: ./go-backend
            file: ./go-backend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR requires lowercase repository/image names.
      - name: Compute lowercase image name
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE=${REGISTRY}/${OWNER,,}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image cache scope so the two builds don't evict each other.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
