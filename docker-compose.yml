# Backend env shared by the migrate + backend services. This compose deploys the
# server stack (admin SPA on :443, widget test portal on :6443 — see
# nginx.staging.conf); every value is overridable via the repo-root .env or the
# shell. NEVER rely on these defaults in production — set GO_ENV=production with
# real secrets (start from .env.staging.example). For pure local development use
# `npm run dev` (Vite on :5173 + the go-backend/ compose) instead.
x-backend-env: &backend-env
  DATABASE_URL: postgres://chatbotadmin:${POSTGRES_PASSWORD:-chatbotadmin}@postgres:5432/chatbotadmin?sslmode=disable
  REDIS_HOST: redis
  GO_ENV: ${GO_ENV:-development}
  JWT_SECRET: ${JWT_SECRET:-local-dev-secret-at-least-32-chars-long-xx}
  AUTH_PROVIDER_SECRET_KEY: ${AUTH_PROVIDER_SECRET_KEY:-}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
  # CORS allowlist: the admin origin (:443) plus the widget test portal (:6443),
  # which posts its login cross-origin to the admin's /api. Prod overrides this
  # via .env; the default mirrors .env.staging.example.
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://sv90073.hrz.uni-giessen.de,https://sv90073.hrz.uni-giessen.de:6443}
  KI_API_KEY: ${KI_API_KEY:-}
  KI_BASE_URL: ${KI_BASE_URL:-https://api.hrz.uni-giessen.de/v1}
  OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-}
  OIDC_IDP: ${OIDC_IDP:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_LOGOUT_URI: ${OIDC_LOGOUT_URI:-}
  OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
  OIDC_SUCCESS_REDIRECT: ${OIDC_SUCCESS_REDIRECT:-}
  OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-}
  # Corporate proxy for reaching the IdP / HRZ from staging (empty locally).
  HTTP_PROXY: ${BACKEND_HTTP_PROXY:-}
  HTTPS_PROXY: ${BACKEND_HTTPS_PROXY:-}
  NO_PROXY: ${BACKEND_NO_PROXY:-localhost,127.0.0.1,postgres,redis,backend}

services:
  # Remote/Production Deployment (Pulls pre-built image from GitHub Container Registry)
  chatbotadmin-frontend:
    # Staging runs the latest built image; Prod pins the prod-ready tag via
    # FRONTEND_IMAGE_TAG in .env (e.g. FRONTEND_IMAGE_TAG=prod).
    image: ghcr.io/stenseegel/chatbotadmin-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: chatbotadmin-frontend
    ports:
      - "443:443"             # admin SPA + /api proxy (HTTPS)
      - "80:80"               # HTTP → HTTPS redirect
      - "6443:6443"           # cross-origin widget test portal (HTTPS, same cert)
    volumes:
      - /etc/ssl/certs/sv90073.pem:/etc/nginx/ssl/sv90073.pem:ro
      - /etc/ssl/private/priv.pem:/etc/nginx/ssl/priv.pem:ro
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    pull_policy: always
    depends_on:
      - backend                # nginx.staging.conf reverse-proxies /api → backend:8080
    environment:
      - HTTP_PROXY=http://10.60.3.254:3128
      - HTTPS_PROXY=http://10.60.3.254:3128
      - NO_PROXY=localhost,127.0.0.1

  # Local-only widget test portal (simulates an external site embedding the widget).
  # Plain HTTP on :8082 — fine for loopback dev, but unusable on a TLS server, so
  # it's gated behind the "local" profile and NOT started by `docker compose up -d`
  # on staging/prod. There the frontend nginx serves the portal over TLS on :6443
  # (see nginx.staging.conf). Start locally via `npm run dev` (which passes
  # --profile local) or `docker compose --profile local up -d widget-test-site`.
  widget-test-site:
    image: nginx:alpine
    container_name: widget-test-site
    profiles: ["local"]
    ports:
      - "8082:80"             # Maps host port 8082 to container port 80 (Nginx webroot)
    volumes:
      - ./widget-test:/usr/share/nginx/html:ro
    restart: always
    environment:
      - HTTP_PROXY=http://10.60.3.254:3128
      - HTTPS_PROXY=http://10.60.3.254:3128
      - NO_PROXY=localhost,127.0.0.1

  # ── Backend stack (auth + model proxy) ───────────────────────────────────────
  # These share this compose project's default network, so the frontend nginx
  # reaches the API at http://backend:8080 (see nginx.conf / nginx.staging.conf).
  # Works zero-config locally (admin / password). The standalone backend compose
  # in go-backend/ is the alternative used by `npm run dev` (Vite on :5173).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbotadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbotadmin}
      POSTGRES_DB: chatbotadmin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbotadmin -d chatbotadmin"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot: apply migrations + seed the admin (and OIDC provider, if set), then exit.
  # Reuses the backend image (same binary set); just overrides the entrypoint.
  migrate:
    image: ghcr.io/stenseegel/chatbotadmin-backend:${BACKEND_IMAGE_TAG:-latest}
    pull_policy: always
    entrypoint: ["/app/migrate"]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    # Prebuilt image from GHCR (published by .github/workflows/docker-publish.yml);
    # staging/prod pull it rather than compiling Go on the server. Prod pins
    # BACKEND_IMAGE_TAG=prod in .env (mirrors FRONTEND_IMAGE_TAG).
    image: ghcr.io/stenseegel/chatbotadmin-backend:${BACKEND_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: chatbotadmin-backend
    environment: *backend-env
    expose:
      - "8080"                # internal only; the frontend nginx proxies to it
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
