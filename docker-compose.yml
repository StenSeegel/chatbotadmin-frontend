services:
  # Remote/Production Deployment (Pulls pre-built image from GitHub Container Registry)
  chatbotadmin-frontend:
    image: ghcr.io/stenseegel/chatbotadmin-frontend:latest
    container_name: chatbotadmin-frontend
    ports:
      - "443:443"             # Maps host port 443 to container HTTPS port 443
      - "80:80"               # Maps host port 80 to container HTTP port 80 (for redirects)
    volumes:
      - /etc/ssl/certs/sv90073.pem:/etc/nginx/ssl/sv90073.pem:ro
      - /etc/ssl/private/priv.pem:/etc/nginx/ssl/priv.pem:ro
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    pull_policy: always
    depends_on:
      - backend               # Nginx proxyt /api/ an diesen Service weiter
    environment:
      - HTTP_PROXY=http://10.60.3.254:3128
      - HTTPS_PROXY=http://10.60.3.254:3128
      - NO_PROXY=localhost,127.0.0.1

  # KI-Backend: stellt /api/chat bereit (wie der Vite-Dev-Proxy).
  # Liest KI_API_KEY / KI_BASE_URL / CORS_ALLOWED_ORIGINS aus .env; der API-Key
  # bleibt serverseitig und erreicht nie den Browser.
  backend:
    build:
      context: ./server
    container_name: chatbotadmin-backend
    env_file:
      - .env
    environment:
      - WIDGETS_FILE=/app/data/widgets.json   # Persistente Widget-Konfigs (Volume)
      - HISTORY_FILE=/app/data/history.json   # Persistente Gesprächsverläufe (Volume)
    volumes:
      - backend-data:/app/data
    expose:
      - "3001"                # Nur im Compose-Netzwerk erreichbar, nicht auf dem Host
    restart: always

  # Local Widget Test Website (Simulates an external site embedding the widget, e.g. uni-giessen.de)
  widget-test-site:
    image: nginx:alpine
    container_name: widget-test-site
    ports:
      - "8082:80"             # Maps host port 8082 to container port 80 (Nginx webroot)
    volumes:
      - ./widget-test:/usr/share/nginx/html:ro
    restart: always
    environment:
      - HTTP_PROXY=http://10.60.3.254:3128
      - HTTPS_PROXY=http://10.60.3.254:3128
      - NO_PROXY=localhost,127.0.0.1

volumes:
  backend-data:                 # Persistente Widget-Konfigurationen des Backends

